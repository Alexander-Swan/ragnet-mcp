services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    cpus: ${RAGNET_QDRANT_CPUS:-2}
    mem_limit: ${RAGNET_QDRANT_MEM_LIMIT:-4g}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    cpus: ${RAGNET_OLLAMA_CPUS:-4}
    mem_limit: ${RAGNET_OLLAMA_MEM_LIMIT:-8g}
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: ${RAGNET_OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_LOADED_MODELS: ${RAGNET_OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_KEEP_ALIVE: ${RAGNET_OLLAMA_KEEP_ALIVE:-30s}

  ragnet-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragnet-mcp
    cpus: ${RAGNET_MCP_CPUS:-1}
    mem_limit: ${RAGNET_MCP_MEM_LIMIT:-1g}
    ports:
      - "${RAGNET_MCP_PORT:-7331}:7331"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_URLS: http://+:7331
      RagNet__Qdrant__BaseUrl: ${RAGNET_QDRANT_BASE_URL:-http://qdrant:6333}
      RagNet__Ollama__BaseUrl: ${RAGNET_OLLAMA_BASE_URL:-http://ollama:11434}
      RagNet__Ollama__EmbeddingModel: ${RAGNET_EMBEDDING_MODEL:-nomic-embed-text}

volumes:
  qdrant_storage:
  ollama:
